<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huddle — Prototype</title>
<style>
  :root{
    --ink:#0E0E0E;
    --ink-soft:#1a1a1a;
    --ink-line:#2a2a2a;
    --acid:#CDFF3A;
    --paper:#F4F3EE;
    --paper-dim:#e6e5df;
    --text-on-dark:#F4F3EE;
    --muted:#8f9088;
    --muted-dark:#6a6b64;
    --danger:#ff6b5e;
    --radius:14px;
    --radius-sm:9px;
    --sidebar-w:236px;
    --font-body:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  svg{width:16px;height:16px;stroke-width:1.8}
  html,body{height:100%}
  body{
    font-family:var(--font-body);
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    font-size:14px;
    line-height:1.45;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  a{color:inherit;text-decoration:none}

  /* ===== D365 host bar ===== */
  .d365-bar{
    height:44px;background:#1b1b2f;color:#e9e9f2;display:flex;align-items:center;
    padding:0 16px;gap:14px;font-size:12.5px;position:sticky;top:0;z-index:50;
    border-bottom:1px solid rgba(255,255,255,.08);
  }
  .d365-bar .waffle{font-size:16px;opacity:.85}
  .d365-bar .d365-title{font-weight:600;letter-spacing:.2px}
  .d365-bar .d365-title span{opacity:.55;font-weight:400}
  .d365-bar .d365-sep{opacity:.3}
  .d365-bar .d365-right{margin-left:auto;display:flex;align-items:center;gap:16px;opacity:.8}
  .d365-bar .d365-chip{width:26px;height:26px;border-radius:50%;background:#3b3b5c;display:grid;place-items:center;font-size:11px;font-weight:600}

  /* ===== App shell ===== */
  .shell{display:flex;height:calc(100vh - 44px);overflow:hidden}

  /* ===== Sidebar (static left menu) ===== */
  .sidebar{
    width:var(--sidebar-w);flex:0 0 var(--sidebar-w);background:var(--ink);
    color:var(--text-on-dark);display:flex;flex-direction:column;padding:20px 0;
  }
  .brand{display:flex;align-items:center;gap:10px;padding:0 22px 22px}
  .logo-mark{display:block}
  .brand .logo-mark{height:28px;width:auto}
  .logo-mark.ph-logo{height:18px;width:auto}
  .nav{display:flex;flex-direction:column;gap:2px;padding:6px 12px;flex:1;overflow-y:auto}
  .nav-label{font-size:10.5px;letter-spacing:1.5px;color:var(--muted-dark);text-transform:uppercase;padding:14px 12px 6px}
  .nav-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:var(--radius-sm);color:#cfcfc8;font-size:13.5px;font-weight:500;transition:.13s;text-align:left;width:100%}
  .nav-item svg{width:17px;height:17px;flex:0 0 17px;stroke-width:1.7}
  .nav-item:hover{background:var(--ink-soft);color:#fff}
  .nav-item.active{background:var(--acid);color:var(--ink);font-weight:600}
  .nav-item.active svg{stroke:var(--ink)}
  .sidebar-foot{padding:14px 22px 2px;border-top:1px solid var(--ink-line);margin-top:8px}
  .sidebar-foot .user{display:flex;align-items:center;gap:10px}
  .sidebar-foot .avatar{width:30px;height:30px;border-radius:50%;background:var(--acid);color:var(--ink);display:grid;place-items:center;font-weight:700;font-size:12px}
  .sidebar-foot .u-name{font-size:12.5px;font-weight:600}
  .sidebar-foot .u-role{font-size:11px;color:var(--muted)}

  /* ===== Main ===== */
  .main{flex:1;overflow-y:auto;background:var(--paper)}
  .topbar{display:flex;align-items:center;gap:16px;padding:20px 34px 0}
  .crumb{font-size:12px;color:var(--muted-dark);display:flex;align-items:center;gap:7px}
  .crumb b{color:var(--ink);font-weight:600}
  .page{padding:22px 34px 60px;max-width:1180px}
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:26px}
  .page-title{font-size:27px;font-weight:700;letter-spacing:-.7px;line-height:1.1}
  .page-sub{color:var(--muted-dark);font-size:13.5px;margin-top:5px}

  /* buttons */
  .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 17px;border-radius:var(--radius-sm);font-size:13.5px;font-weight:600;transition:.13s;white-space:nowrap}
  .btn svg{width:16px;height:16px;stroke-width:2}
  .btn-primary{background:var(--ink);color:var(--paper)}
  .btn-primary:hover{background:#000}
  .btn-acid{background:var(--acid);color:var(--ink)}
  .btn-acid:hover{filter:brightness(1.04)}
  .btn-ghost{background:transparent;color:var(--ink);border:1px solid #d3d2cb}
  .btn-ghost:hover{background:var(--paper-dim)}

  /* cards */
  .grid{display:grid;gap:16px}
  .card{background:#fff;border:1px solid #e7e6df;border-radius:var(--radius);padding:20px}
  .card.dark{background:var(--ink);color:var(--paper);border-color:var(--ink-line)}

  /* KPI */
  .kpi-grid{grid-template-columns:repeat(4,1fr)}
  .kpi .kpi-label{font-size:12px;color:var(--muted-dark);font-weight:500;display:flex;align-items:center;gap:7px}
  .kpi.dark .kpi-label{color:var(--muted)}
  .kpi .kpi-num{font-size:32px;font-weight:700;letter-spacing:-1px;margin-top:10px;line-height:1}
  .kpi .kpi-delta{font-size:12px;margin-top:8px;color:#3a9d5d;font-weight:600}
  .kpi .kpi-delta.flat{color:var(--muted-dark)}
  .dot-acid{width:8px;height:8px;border-radius:50%;background:var(--acid);display:inline-block}

  /* progress */
  .bar{height:7px;background:var(--paper-dim);border-radius:20px;overflow:hidden}
  .bar > i{display:block;height:100%;background:var(--acid);border-radius:20px}
  .card.dark .bar{background:#242424}

  /* tables */
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted-dark);font-weight:600;padding:0 14px 12px}
  td{padding:13px 14px;border-top:1px solid #eeede6;font-size:13.5px;vertical-align:middle}
  tr:hover td{background:#faf9f5}
  .tag{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11.5px;font-weight:600}
  .tag.green{background:#e4f7d9;color:#3a7d24}
  .tag.grey{background:#eeede6;color:var(--muted-dark)}
  .tag.yellow{background:#fbf3cf;color:#8a6d15}
  .tag.blue{background:#e0eefb;color:#2764a8}
  .tag .stat-dot{width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block}
  .mini-avatar{width:28px;height:28px;border-radius:50%;background:var(--ink);color:var(--acid);display:grid;place-items:center;font-size:11px;font-weight:700}

  /* section title */
  .sec-title{font-size:12px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted-dark);font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}

  /* event list cards */
  .ev-card{background:#fff;border:1px solid #e7e6df;border-radius:var(--radius);overflow:hidden;transition:.15s;cursor:pointer;display:flex;flex-direction:column}
  .ev-card:hover{border-color:var(--ink);transform:translateY(-2px);box-shadow:0 10px 24px -14px rgba(0,0,0,.3)}
  .ev-card .ev-top{background:var(--ink);padding:16px 18px;color:var(--paper);position:relative;min-height:78px}
  .ev-card .ev-type{font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--acid);font-weight:600}
  .ev-card .ev-name{font-size:16px;font-weight:600;margin-top:5px;letter-spacing:-.3px}
  .ev-card .ev-body{padding:16px 18px;flex:1;display:flex;flex-direction:column;gap:12px}
  .ev-meta{font-size:12.5px;color:var(--muted-dark);display:flex;align-items:center;gap:7px}
  .ev-meta svg,.s-sub svg,.fn-type svg,.fn-when svg,.tr-title svg,.tr-desc svg,.po-title svg{width:14px;height:14px;flex:0 0 14px;stroke-width:1.9;opacity:.75}
  .ev-foot{display:flex;align-items:center;justify-content:space-between;margin-top:auto}
  .ev-fill{font-size:12px;color:var(--muted-dark)}

  /* ===== Wizard ===== */
  .wizard{display:grid;grid-template-columns:270px 1fr;gap:26px;align-items:start}
  .phases{display:flex;flex-direction:column;gap:10px;position:sticky;top:22px}
  .phase-card{background:#fff;border:1.5px solid #e7e6df;border-radius:var(--radius-sm);overflow:hidden;transition:.12s}
  .phase-head{display:flex;align-items:center;gap:12px;width:100%;padding:14px;text-align:left}
  .phase-icon{width:40px;height:40px;flex:0 0 40px;border-radius:10px;background:#eeede6;color:var(--muted-dark);display:grid;place-items:center;transition:.12s}
  .phase-icon svg{width:19px;height:19px;stroke-width:1.7}
  .phase-info{flex:1;min-width:0}
  .phase-title{font-size:13px;font-weight:700;color:var(--muted-dark)}
  .phase-count{font-size:11px;color:var(--muted-dark);margin-top:2px}
  .phase-bar{height:4px;border-radius:2px;background:#eeede6;margin-top:8px;overflow:hidden}
  .phase-bar i{display:block;height:100%;background:var(--muted-dark);border-radius:2px}
  .phase-card.active{border-color:var(--ink)}
  .phase-card.active .phase-icon{background:var(--ink);color:var(--acid)}
  .phase-card.active .phase-title{color:var(--ink)}
  .phase-card.active .phase-bar i{background:var(--acid)}
  .phase-steps{border-top:1px solid #eeede6;padding:6px 8px 8px;display:flex;flex-direction:column;gap:2px}
  .phase-step{display:flex;align-items:center;gap:10px;width:100%;padding:8px 9px;border-radius:7px;font-size:12.5px;font-weight:500;color:var(--muted-dark);text-align:left}
  .phase-step:hover{background:#faf9f5}
  .phase-step.current{background:var(--ink);color:var(--paper);font-weight:600}
  .phase-step.done{color:var(--ink)}
  .ps-dot{width:16px;height:16px;flex:0 0 16px;border-radius:50%;border:1.5px solid #d3d2cb;display:grid;place-items:center}
  .ps-dot svg{width:10px;height:10px;stroke-width:3}
  .phase-step.current .ps-dot{background:var(--acid);border-color:var(--acid)}
  .phase-step.done .ps-dot{background:#e4f7d9;border-color:#e4f7d9;color:#3a7d24}
  .wizard-panel{background:#fff;border:1px solid #e7e6df;border-radius:var(--radius);padding:30px 32px;min-height:440px;display:flex;flex-direction:column}
  .wizard-panel .wp-eyebrow{font-size:11.5px;letter-spacing:1px;text-transform:uppercase;color:var(--acid);font-weight:700;filter:brightness(.7)}
  .wizard-panel .wp-title{font-size:22px;font-weight:700;letter-spacing:-.5px;margin-top:6px}
  .wizard-panel .wp-desc{color:var(--muted-dark);font-size:13.5px;margin-top:6px;max-width:560px}
  .wp-body{margin-top:26px;flex:1}
  .wp-foot{display:flex;justify-content:space-between;align-items:center;margin-top:26px;padding-top:22px;border-top:1px solid #eeede6}

  /* forms */
  .field{margin-bottom:18px}
  .field label{display:block;font-size:12.5px;font-weight:600;margin-bottom:7px}
  .field .hint{font-size:12px;color:var(--muted-dark);font-weight:400}
  .inp,.sel,textarea.inp{width:100%;padding:11px 13px;border:1px solid #d9d8d1;border-radius:var(--radius-sm);font-size:13.5px;font-family:inherit;background:#fff;transition:.12s}
  .inp:focus,.sel:focus,textarea.inp:focus{outline:none;border-color:var(--ink);box-shadow:0 0 0 3px rgba(205,255,58,.35)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
  .chip-pick{display:flex;flex-wrap:wrap;gap:9px}
  .chip{padding:9px 15px;border:1px solid #d9d8d1;border-radius:20px;font-size:13px;font-weight:500;transition:.12s;cursor:pointer;background:#fff}
  .chip:hover{border-color:var(--ink)}
  .chip.sel{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .chip.sel .dot-acid{box-shadow:0 0 0 2px rgba(205,255,58,.3)}

  /* session builder */
  .session-row{display:grid;grid-template-columns:1fr 130px 90px 40px;gap:12px;align-items:center;padding:14px;background:#faf9f5;border:1px solid #eeede6;border-radius:var(--radius-sm);margin-bottom:10px}
  .session-row .s-name{font-size:13.5px;font-weight:600}
  .session-row .s-sub{font-size:12px;color:var(--muted-dark);margin-top:2px}
  .icon-btn{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:var(--muted-dark);transition:.12s}
  .icon-btn:hover{background:#eeede6;color:var(--danger)}
  .icon-btn svg{width:16px;height:16px;stroke-width:1.8}
  .add-line{display:flex;align-items:center;gap:9px;padding:12px;border:1.5px dashed #d3d2cb;border-radius:var(--radius-sm);color:var(--muted-dark);font-size:13px;font-weight:600;width:100%;justify-content:center;transition:.12s}
  .add-line:hover{border-color:var(--ink);color:var(--ink);background:#faf9f5}
  .add-line svg{width:15px;height:15px;flex:0 0 15px;stroke-width:2}

  /* comms flow */
  .flow-line{display:flex;align-items:stretch;gap:0;flex-wrap:wrap}
  .flow-node{background:#fff;border:1px solid #e7e6df;border-radius:var(--radius-sm);padding:14px 16px;min-width:150px;position:relative}
  .flow-node .fn-type{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted-dark);font-weight:600}
  .flow-node .fn-title{font-size:13.5px;font-weight:600;margin-top:4px}
  .flow-node .fn-when{font-size:12px;color:var(--muted-dark);margin-top:6px}
  .flow-arrow{align-self:center;padding:0 6px;color:#c9c8c1}
  .flow-arrow svg{width:18px;height:18px;stroke-width:1.8}

  /* toggle switch */
  .switch{position:relative;width:40px;height:23px;flex:0 0 40px}
  .switch input{opacity:0;width:0;height:0}
  .slider{position:absolute;inset:0;background:#d3d2cb;border-radius:20px;transition:.2s;cursor:pointer}
  .slider:before{content:"";position:absolute;height:17px;width:17px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
  .switch input:checked + .slider{background:var(--ink)}
  .switch input:checked + .slider:before{transform:translateX(17px);background:var(--acid)}

  .toggle-row{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;padding:15px 0;border-bottom:1px solid #eeede6}
  .toggle-row:last-child{border-bottom:none}
  .toggle-row .tr-title{font-size:13.5px;font-weight:600}
  .toggle-row .tr-desc{font-size:12.5px;color:var(--muted-dark);margin-top:3px;max-width:440px}

  /* segments */
  .seg-card{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;background:#faf9f5;border:1px solid #eeede6;border-radius:var(--radius-sm);margin-bottom:10px}
  .seg-card .seg-name{font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:9px}
  .seg-card .seg-count{font-size:12.5px;color:var(--muted-dark)}
  .seg-swatch{width:10px;height:10px;border-radius:3px}

  /* publish */
  .pub-choice{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:8px}
  .format-choice{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:8px}
  .pub-opt{border:1.5px solid #d9d8d1;border-radius:var(--radius);padding:22px;cursor:pointer;transition:.13s}
  .pub-opt:hover{border-color:var(--ink)}
  .pub-opt.sel{border-color:var(--ink);background:var(--ink);color:var(--paper)}
  .pub-opt .po-icon{width:38px;height:38px;border-radius:10px;background:#eeede6;display:grid;place-items:center;margin-bottom:14px}
  .pub-opt .po-icon svg{width:20px;height:20px;stroke-width:1.6}
  .pub-opt.sel .po-icon{background:var(--acid);color:var(--ink)}
  .pub-opt .po-title{font-size:15px;font-weight:700}
  .pub-opt .po-desc{font-size:12.5px;color:var(--muted-dark);margin-top:6px}
  .pub-opt.sel .po-desc{color:var(--muted)}

  /* drag-and-drop block builder (page web / e-mail / formulaire) */
  .preview-page{border:1px solid #e7e6df;border-radius:12px;overflow:hidden;background:#fff}
  .builder-device{display:flex;gap:8px}
  .dev-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:20px;font-size:12.5px;font-weight:600;color:var(--muted-dark);background:#eeede6}
  .dev-btn svg{width:14px;height:14px;stroke-width:2}
  .dev-btn.active{background:var(--ink);color:var(--paper)}
  .builder-layout{display:grid;grid-template-columns:260px 1fr;gap:20px;align-items:start}
  .builder-panel{background:#faf9f5;border:1px solid #eeede6;border-radius:var(--radius);padding:14px}
  .builder-row{display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid #eeede6;cursor:grab}
  .builder-row:last-child{border-bottom:none}
  .builder-row:active{cursor:grabbing}
  .builder-handle{color:var(--muted-dark);font-size:15px;line-height:1}
  .builder-label{flex:1;font-size:12.5px;font-weight:600}
  .builder-preview{overflow:auto}
  .builder-frame.mobile .preview-page{width:375px;margin:0 auto;border-radius:26px;border:6px solid var(--ink)}

  /* reporting */
  .chart-bars{display:flex;align-items:flex-end;gap:14px;height:180px;padding-top:20px}
  .chart-bars .cb{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end}
  .chart-bars .cb .cb-bar{width:100%;background:var(--acid);border-radius:6px 6px 0 0;position:relative;transition:.3s}
  .chart-bars .cb .cb-bar.dim{background:#e4e3dc}
  .chart-bars .cb .cb-lbl{font-size:11px;color:var(--muted-dark);font-weight:500}
  .chart-bars .cb .cb-val{font-size:12px;font-weight:700;position:absolute;top:-20px;left:50%;transform:translateX(-50%)}

  .donut-wrap{display:flex;align-items:center;gap:24px}
  .legend-item{display:flex;align-items:center;gap:9px;font-size:13px;margin-bottom:10px}
  .legend-item .lg-dot{width:11px;height:11px;border-radius:3px}
  .legend-item .lg-val{margin-left:auto;font-weight:700}

  /* check-in phone */
  .phone-demo{display:flex;gap:32px;align-items:center;flex-wrap:wrap}
  .phone{width:250px;flex:0 0 250px;background:var(--ink);border-radius:30px;padding:12px;box-shadow:0 20px 50px -20px rgba(0,0,0,.5)}
  .phone .screen{background:#161616;border-radius:22px;overflow:hidden;height:500px;position:relative;display:flex;flex-direction:column}
  .phone .ph-top{padding:18px 18px 14px;color:var(--paper)}
  .phone .ph-scan{flex:1;margin:0 18px;border:2px solid var(--acid);border-radius:16px;position:relative;background:#0c0c0c;overflow:hidden}
  .phone .ph-scan svg{width:56px;height:56px;stroke-width:1.2}
  .scanline{position:absolute;left:0;right:0;height:2px;background:var(--acid);box-shadow:0 0 12px var(--acid);animation:scan 2.4s ease-in-out infinite}
  @keyframes scan{0%,100%{top:12%}50%{top:88%}}
  .phone .ph-corner{position:absolute;width:26px;height:26px;border:3px solid var(--acid)}
  .c-tl{top:14px;left:14px;border-right:none;border-bottom:none;border-radius:8px 0 0 0}
  .c-tr{top:14px;right:14px;border-left:none;border-bottom:none;border-radius:0 8px 0 0}
  .c-bl{bottom:14px;left:14px;border-right:none;border-top:none;border-radius:0 0 0 8px}
  .c-br{bottom:14px;right:14px;border-left:none;border-top:none;border-radius:0 0 8px 0}
  .phone .ph-foot{padding:20px 18px;color:var(--paper);text-align:center}
  .ph-count{font-size:30px;font-weight:700;color:var(--acid)}

  .checkin-feed{flex:1;min-width:300px}
  .feed-item{display:flex;align-items:center;gap:13px;padding:13px 0;border-bottom:1px solid #eeede6}
  .feed-item .fi-time{font-size:11.5px;color:var(--muted-dark);margin-left:auto}
  .fi-check{width:12px;height:12px;flex:0 0 12px;stroke-width:2.5;vertical-align:-1px;color:var(--acid-dark, #6b8f00)}

  /* settings */
  .settings-nav{display:flex;gap:8px;border-bottom:1px solid #e7e6df;margin-bottom:24px}
  .settings-nav button{padding:11px 4px;font-size:13.5px;font-weight:600;color:var(--muted-dark);border-bottom:2px solid transparent;margin-bottom:-1px}
  .settings-nav button.active{color:var(--ink);border-color:var(--acid)}

  /* ===== Segment / audience builder (Dataverse-style) ===== */
  .sb-source{background:#eef4ff;border:1px solid #d5e3fb;color:#2764a8;border-radius:var(--radius-sm);padding:9px 13px;font-size:12.5px;font-weight:500;display:inline-flex;align-items:center;gap:8px}
  .sb-source svg{width:15px;height:15px;flex:0 0 15px}
  .member-pick{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:6px}

/* Steps actually shown, given current mode */
function wizardSteps(){
  return ALL_STEPS.filter(s => !(state.eventMode==='simple' && s.simpleHidden));
}

/* Steps grouped into 3 collapsible phase cards for the sidebar nav */
const PHASES = [
  { key:'setup',      label:'Je configure',                    icon:'settings', steps:['format','info','program','speakers','segment','quotas'] },
  { key:'experience', label:'Je construis l’expérience invité', icon:'grid',     steps:['forms','web','comms'] },
  { key:'launch',     label:'Je diffuse et je mesure',          icon:'rocket',   steps:['publish','survey'] },
];

function wizGo(i){
  const steps = wizardSteps();
  state.wizardStep = Math.max(0, Math.min(steps.length-1, i));
  state.wizardMax = Math.max(state.wizardMax, state.wizardStep);
  state.wizardOpenPhase = null;
  render();
  const m=document.querySelector('.main'); if(m)m.scrollTo(0,0);
}

function togglePhase(key){
  state.wizardOpenPhase = key;
  render();
}

function phaseSidebar(){
  const steps = wizardSteps();
  const current = steps[state.wizardStep] || steps[0];
  const activeKey = (PHASES.find(p=>p.steps.includes(current.key)) || PHASES[0]).key;
  const openKey = state.wizardOpenPhase || activeKey;
  return `<div class="phases">${PHASES.map(p=>{
    const pSteps = steps.map((s,i)=>({...s,i})).filter(s=>p.steps.includes(s.key));
    if(!pSteps.length) return '';
    const done = pSteps.filter(s=>s.i<state.wizardMax).length;
    const isActive = p.key===activeKey;
    const isOpen = p.key===openKey;
    return `
    <div class="phase-card ${isActive?'active':''}">
      <button class="phase-head" onclick="togglePhase('${p.key}')">
        <span class="phase-icon">${icon(p.icon)}</span>
        <div class="phase-info">
          <div class="phase-title">${p.label}</div>
          <div class="phase-count">${done} sur ${pSteps.length} étapes</div>
          <div class="phase-bar"><i style="width:${Math.round(done/pSteps.length*100)}%"></i></div>
        </div>
      </button>
      ${isOpen?`<div class="phase-steps">${pSteps.map(s=>{
        const cls = s.i===state.wizardStep?'current':(s.i<state.wizardMax?'done':'');
        return `<button class="phase-step ${cls}" onclick="wizGo(${s.i})">
          <span class="ps-dot">${cls==='done'?icon('check'):''}</span>
          <span>${s.label}</span></button>`;
      }).join('')}</div>`:''}
    </div>`;
  }).join('')}</div>`;
}

function wizFoot(){
  const steps = wizardSteps();
  const first = state.wizardStep===0;
  const last = state.wizardStep===steps.length-1;
  return `<div class="wp-foot">
    <button class="btn btn-ghost ${first?'hidden':''}" onclick="wizGo(${state.wizardStep-1})">${icon('arrowLeft')} Précédent</button>
    ${first?'<span></span>':''}
    ${last
      ? `<button class="btn btn-acid" onclick="alert('Prototype : événement publié 🎉')">${icon('send')} Publier l’événement</button>`
      : `<button class="btn btn-primary" onclick="wizGo(${state.wizardStep+1})">Continuer ${icon('arrowRight')}</button>`}
  </div>`;
}

/* ---------- date helper (avoids re-typing the French long date format everywhere) ---------- */
function fmtDate(iso){
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});
}

/* ============================================================
   Drag-and-drop block builder — shared by the page/e-mail/form builders.
   Each builder is just: an array of {key,label,on} blocks in state,
   a preview renderer keyed by block.key, reordered by native HTML5 drag&drop.
   ============================================================ */
let builderDragIndex = null;
function builderDragStart(i){ builderDragIndex = i; }
function builderDrop(i, blocksKey){
  if(builderDragIndex===null || builderDragIndex===i) return;
  const arr = state[blocksKey];
  const [moved] = arr.splice(builderDragIndex,1);
  arr.splice(i,0,moved);
  builderDragIndex = null;
  render();
}

function builderShell(blocksKey, previewFn){
  const blocks = state[blocksKey];
  return `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px">
    <button class="btn btn-ghost" onclick="state.builderOpen=null;render()">${icon('arrowLeft')} Retour</button>
    <div class="builder-device">
      <button class="dev-btn ${state.builderDevice==='desktop'?'active':''}" onclick="state.builderDevice='desktop';render()">${icon('monitor')} Desktop</button>
      <button class="dev-btn ${state.builderDevice==='mobile'?'active':''}" onclick="state.builderDevice='mobile';render()">${icon('smartphone')} Mobile</button>
    </div>
  </div>
  <div class="builder-layout">
    <div class="builder-panel">
      <div class="sec-title" style="margin-bottom:2px">Sections</div>
      <div class="tr-desc" style="margin-bottom:10px">Glissez pour réordonner, activez pour afficher.</div>
      ${blocks.map((b,i)=>`
        <div class="builder-row" draggable="true" ondragstart="builderDragStart(${i})" ondragover="event.preventDefault()" ondrop="builderDrop(${i},'${blocksKey}')">
          <span class="builder-handle">⠿</span>
          <span class="builder-label">${b.label}</span>
          <label class="switch"><input type="checkbox" ${b.on?'checked':''} onchange="state.${blocksKey}[${i}].on=this.checked;render()"><span class="slider"></span></label>
        </div>`).join('')}
    </div>
    <div class="builder-preview">
      <div class="builder-frame ${state.builderDevice}">${previewFn(blocks.filter(b=>b.on))}</div>
    </div>
  </div>`;
}
