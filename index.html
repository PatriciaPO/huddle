<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huddle — Prototype</title>
<style>
  :root{
    /* ===== Fluent 2 design tokens (Microsoft Dynamics 365 visual language) ===== */
    --ink:#242424;
    --ink-soft:#023E7D;
    --ink-line:rgba(255,255,255,.14);
    --surface-dark:#002050;
    --brand:#0F6CBD;
    --brand-hover:#115EA3;
    --brand-pressed:#0C3B5E;
    --brand-tint:#EBF3FC;
    --brand-on-dark:#3DA9F5;
    --brand-rgb:15,108,189;
    --paper:#F5F5F5;
    --paper-dim:#E8E8E8;
    --surface:#FFFFFF;
    --surface-alt:#FAFAFA;
    --surface-sunken:#F0F0F0;
    --border:#E0E0E0;
    --border-strong:#D1D1D1;
    --text-on-dark:#F5F5F5;
    --muted:#C7C7C7;
    --muted-dark:#616161;
    --danger:#D13438;
    --success-bg:#F1FAF1;
    --success-fg:#0E700E;
    --success-fg-on-dark:#8FE3A8;
    --warning-bg:#FFF8F0;
    --warning-fg:#9D5D00;
    --danger-bg:#FDF3F4;
    --danger-fg:#B10E1C;
    --info-bg:#EBF3FC;
    --info-fg:#0F6CBD;
    --purple:#742774;
    --purple-tint:#F3EBF8;
    --warm:#D24726;
    --warm-tint:#FDEEE9;
    --radius:8px;
    --radius-sm:4px;
    --sidebar-w:236px;
    --shadow-2:0 0 2px rgba(0,0,0,.12),0 1px 2px rgba(0,0,0,.14);
    --shadow-4:0 0 2px rgba(0,0,0,.12),0 2px 4px rgba(0,0,0,.14);
    --shadow-8:0 0 2px rgba(0,0,0,.12),0 4px 8px rgba(0,0,0,.14);
    --shadow-16:0 0 2px rgba(0,0,0,.12),0 8px 16px rgba(0,0,0,.18);
    --font-body:'Segoe UI Variable Text','Segoe UI',-apple-system,BlinkMacSystemFont,Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  svg{width:16px;height:16px;stroke-width:1.8}
  html,body{height:100%}
  body{
    font-family:var(--font-body);
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    font-size:14px;
    line-height:1.45;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  a{color:inherit;text-decoration:none}

  /* ===== D365 host bar ===== */
  .d365-bar{
    height:44px;background:var(--surface);color:var(--ink);display:flex;align-items:center;
    padding:0 16px;gap:14px;font-size:12.5px;position:sticky;top:0;z-index:50;
    border-bottom:1px solid var(--border);
  }
  .d365-bar .waffle{font-size:16px;opacity:.65}
  .d365-bar .d365-title{font-weight:600;letter-spacing:.2px}
  .d365-bar .d365-title span{opacity:.55;font-weight:400}
  .d365-bar .d365-sep{opacity:.35}
  .d365-bar .d365-right{margin-left:auto;display:flex;align-items:center;gap:16px;opacity:.8}
  .d365-bar .d365-chip{width:26px;height:26px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:11px;font-weight:600}

  /* ===== App shell ===== */
  .shell{display:flex;height:calc(100vh - 44px);overflow:hidden}

  /* ===== Sidebar (static left menu — Fluent nav rail) ===== */
  .sidebar{
    width:var(--sidebar-w);flex:0 0 var(--sidebar-w);background:var(--surface);
    color:var(--ink);display:flex;flex-direction:column;padding:20px 0;
    border-right:1px solid var(--border);
  }
  .brand{display:flex;align-items:center;gap:10px;padding:0 22px 22px}
  .logo-mark{display:block}
  .brand .logo-mark{height:28px;width:auto}
  .logo-mark.ph-logo{height:18px;width:auto}
  .nav{display:flex;flex-direction:column;gap:2px;padding:6px 12px;flex:1;overflow-y:auto}
  .nav-label{font-size:10.5px;letter-spacing:1.5px;color:var(--muted-dark);text-transform:uppercase;padding:14px 12px 6px}
  .nav-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:var(--radius-sm);color:var(--muted-dark);font-size:13.5px;font-weight:500;transition:.13s;text-align:left;width:100%}
  .nav-item svg{width:17px;height:17px;flex:0 0 17px;stroke-width:1.7}
  .nav-item:hover{background:var(--surface-sunken);color:var(--ink)}
  .nav-item.active{background:var(--brand-tint);color:var(--brand);font-weight:600;box-shadow:inset 3px 0 0 var(--brand)}
  .nav-item.active svg{stroke:var(--brand)}
  .sidebar-foot{padding:14px 22px 2px;border-top:1px solid var(--border);margin-top:8px}
  .sidebar-foot .user{display:flex;align-items:center;gap:10px}
  .sidebar-foot .avatar{width:30px;height:30px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:700;font-size:12px}
  .sidebar-foot .u-name{font-size:12.5px;font-weight:600}
  .sidebar-foot .u-role{font-size:11px;color:var(--muted-dark)}

  /* ===== Main ===== */
  .main{flex:1;overflow-y:auto;background:var(--paper)}
  .topbar{display:flex;align-items:center;gap:16px;padding:20px 34px 0}
  .crumb{font-size:12px;color:var(--muted-dark);display:flex;align-items:center;gap:7px}
  .crumb b{color:var(--ink);font-weight:600}
  .page{padding:22px 34px 60px;max-width:1180px}
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:26px}
  .page-title{font-size:27px;font-weight:700;letter-spacing:-.7px;line-height:1.1}
  .page-sub{color:var(--muted-dark);font-size:13.5px;margin-top:5px}

  /* buttons */
  .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 17px;border-radius:var(--radius-sm);font-size:13.5px;font-weight:600;transition:.13s;white-space:nowrap}
  .btn svg{width:16px;height:16px;stroke-width:2}
  .btn-primary{background:var(--surface-dark);color:#fff}
  .btn-primary:hover{background:var(--ink-soft)}
  .btn-acid{background:var(--brand);color:#fff}
  .btn-acid:hover{background:var(--brand-hover)}
  .btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--border-strong)}
  .btn-ghost:hover{background:var(--surface-sunken)}

  /* cards */
  .grid{display:grid;gap:16px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-2)}
  .card.dark{background:var(--surface-dark);color:var(--paper);border-color:var(--ink-line)}

  /* KPI */
  .kpi-grid{grid-template-columns:repeat(4,1fr)}
  .kpi .kpi-label{font-size:12px;color:var(--muted-dark);font-weight:500;display:flex;align-items:center;gap:7px}
  .kpi.dark .kpi-label{color:var(--muted)}
  .kpi.dark .kpi-delta{color:var(--success-fg-on-dark)}
  .kpi .kpi-num{font-size:32px;font-weight:700;letter-spacing:-1px;margin-top:10px;line-height:1}
  .kpi .kpi-delta{font-size:12px;margin-top:8px;color:var(--success-fg);font-weight:600}
  .kpi .kpi-delta.flat{color:var(--muted-dark)}
  .dot-acid{width:8px;height:8px;border-radius:50%;background:var(--brand);display:inline-block}

  /* progress */
  .bar{height:7px;background:var(--paper-dim);border-radius:20px;overflow:hidden}
  .bar > i{display:block;height:100%;background:var(--brand);border-radius:20px}
  .card.dark .bar{background:#3a3a3a}

  /* tables */
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted-dark);font-weight:600;padding:0 14px 12px}
  td{padding:13px 14px;border-top:1px solid var(--border);font-size:13.5px;vertical-align:middle}
  tr:hover td{background:var(--surface-alt)}
  .tag{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11.5px;font-weight:600}
  .tag.green{background:var(--success-bg);color:var(--success-fg)}
  .tag.grey{background:var(--surface-sunken);color:var(--muted-dark)}
  .tag.yellow{background:var(--warning-bg);color:var(--warning-fg)}
  .tag.blue{background:var(--info-bg);color:var(--info-fg)}
  .tag .stat-dot{width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block}
  .mini-avatar{width:28px;height:28px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:11px;font-weight:700}

  /* section title */
  .sec-title{font-size:12px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted-dark);font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}

  /* event list cards */
  .ev-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:.15s;cursor:pointer;display:flex;flex-direction:column;box-shadow:var(--shadow-2)}
  .ev-card:hover{border-color:var(--brand);transform:translateY(-2px);box-shadow:var(--shadow-8)}
  .ev-card .ev-top{background:var(--surface-dark);padding:16px 18px;color:var(--paper);position:relative;min-height:78px}
  .ev-card .ev-type{font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--brand-on-dark);font-weight:600}
  .ev-card .ev-name{font-size:16px;font-weight:600;margin-top:5px;letter-spacing:-.3px}
  .ev-card .ev-body{padding:16px 18px;flex:1;display:flex;flex-direction:column;gap:12px}
  .ev-meta{font-size:12.5px;color:var(--muted-dark);display:flex;align-items:center;gap:7px}
  .ev-meta svg,.s-sub svg,.fn-type svg,.fn-when svg,.tr-title svg,.tr-desc svg,.po-title svg{width:14px;height:14px;flex:0 0 14px;stroke-width:1.9;opacity:.75}
  .ev-foot{display:flex;align-items:center;justify-content:space-between;margin-top:auto}
  .ev-fill{font-size:12px;color:var(--muted-dark)}

  /* ===== Wizard ===== */
  .wizard{display:grid;grid-template-columns:270px 1fr;gap:26px;align-items:start}
  .phases{display:flex;flex-direction:column;gap:10px;position:sticky;top:22px}
  .phase-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;transition:.12s}
  .phase-head{display:flex;align-items:center;gap:12px;width:100%;padding:14px;text-align:left}
  .phase-icon{width:40px;height:40px;flex:0 0 40px;border-radius:10px;background:var(--surface-sunken);color:var(--muted-dark);display:grid;place-items:center;transition:.12s}
  .phase-icon svg{width:19px;height:19px;stroke-width:1.7}
  .phase-info{flex:1;min-width:0}
  .phase-title{font-size:13px;font-weight:700;color:var(--muted-dark)}
  .phase-count{font-size:11px;color:var(--muted-dark);margin-top:2px}
  .phase-bar{height:4px;border-radius:2px;background:var(--surface-sunken);margin-top:8px;overflow:hidden}
  .phase-bar i{display:block;height:100%;background:var(--muted-dark);border-radius:2px}
  .phase-card.active{border-color:var(--brand)}
  .phase-card.active .phase-icon{background:var(--brand);color:#fff}
  .phase-card.active .phase-title{color:var(--ink)}
  .phase-card.active .phase-bar i{background:var(--brand)}
  .phase-steps{border-top:1px solid var(--border);padding:6px 8px 8px;display:flex;flex-direction:column;gap:2px}
  .phase-step{display:flex;align-items:center;gap:10px;width:100%;padding:8px 9px;border-radius:7px;font-size:12.5px;font-weight:500;color:var(--muted-dark);text-align:left}
  .phase-step:hover{background:var(--surface-alt)}
  .phase-step.current{background:var(--brand-tint);color:var(--brand);font-weight:600}
  .phase-step.done{color:var(--ink)}
  .ps-dot{width:16px;height:16px;flex:0 0 16px;border-radius:50%;border:1.5px solid var(--border-strong);display:grid;place-items:center}
  .ps-dot svg{width:10px;height:10px;stroke-width:3}
  .phase-step.current .ps-dot{background:var(--brand);border-color:var(--brand)}
  .phase-step.done .ps-dot{background:var(--success-bg);border-color:var(--success-bg);color:var(--success-fg)}

  /* mini-parcours interne de l'étape "Programme" */
  .prog-stepper{display:flex;align-items:center;flex-wrap:wrap;row-gap:10px;padding-bottom:18px;border-bottom:1px solid var(--border)}
  .prog-stepper-item{display:flex;align-items:center;gap:8px;flex:0 0 auto}
  .prog-stepper-dot{width:24px;height:24px;border-radius:50%;background:var(--surface-sunken);color:var(--muted-dark);display:grid;place-items:center;font-size:11.5px;font-weight:700;flex:0 0 24px}
  .prog-stepper-dot svg{width:12px;height:12px;stroke-width:3}
  .prog-stepper-item.current .prog-stepper-dot{background:var(--brand);color:#fff}
  .prog-stepper-item.done .prog-stepper-dot{background:var(--success-bg);color:var(--success-fg)}
  .prog-stepper-label{font-size:12.5px;font-weight:600;color:var(--muted-dark);white-space:nowrap}
  .prog-stepper-item.current .prog-stepper-label{color:var(--brand)}
  .prog-stepper-line{flex:1 1 24px;height:2px;background:var(--border);margin:0 10px;min-width:16px}
  .wizard-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:30px 32px;min-height:440px;display:flex;flex-direction:column;box-shadow:var(--shadow-2)}
  .wizard-panel .wp-title{font-size:22px;font-weight:700;letter-spacing:-.5px}
  .wizard-panel .wp-desc{color:var(--muted-dark);font-size:13.5px;margin-top:6px;max-width:560px}
  .wp-body{margin-top:26px;flex:1}
  .wp-foot{display:flex;justify-content:space-between;align-items:center;margin-top:26px;padding-top:22px;border-top:1px solid var(--border)}

  /* forms */
  .field{margin-bottom:18px}
  .field label{display:block;font-size:12.5px;font-weight:600;margin-bottom:7px}
  .field .hint{font-size:12px;color:var(--muted-dark);font-weight:400}
  .inp,.sel,textarea.inp{width:100%;padding:11px 13px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);font-size:13.5px;font-family:inherit;background:var(--surface);transition:.12s}
  .inp:focus,.sel:focus,textarea.inp:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(var(--brand-rgb),.25)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
  .chip-pick{display:flex;flex-wrap:wrap;gap:9px}
  .chip{padding:9px 15px;border:1px solid var(--border-strong);border-radius:20px;font-size:13px;font-weight:500;transition:.12s;cursor:pointer;background:var(--surface)}
  .chip:hover{border-color:var(--brand)}
  .chip.sel{background:var(--brand-tint);color:var(--brand);border-color:var(--brand)}
  .chip.sel .dot-acid{box-shadow:0 0 0 2px rgba(255,255,255,.7)}

  /* session builder */
  .session-row{display:grid;grid-template-columns:1fr 130px 90px 40px;gap:12px;align-items:center;padding:14px;background:var(--surface-alt);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:10px}
  .session-row .s-name{font-size:13.5px;font-weight:600}
  .session-row .s-sub{font-size:12px;color:var(--muted-dark);margin-top:2px}
  .agenda-row{display:grid;grid-template-columns:74px 1fr 150px 40px;gap:12px;align-items:center;padding:14px;background:var(--surface-alt);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:10px}
  .agenda-row .s-name{font-size:13.5px;font-weight:600}
  .agenda-row .s-sub{font-size:12px;color:var(--muted-dark);margin-top:2px}
  .group-card{border:1.5px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:14px;background:var(--surface)}
  .group-card .grp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:12px}
  .group-card .grp-title{font-size:14px;font-weight:700;flex:1;border:none;background:transparent;padding:0;width:auto}
  .group-card .grp-title:focus{outline:none;box-shadow:none}
  .group-card .grp-quota{font-size:12px;color:var(--muted-dark);white-space:nowrap}
  .icon-btn{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:var(--muted-dark);transition:.12s}
  .icon-btn:hover{background:var(--surface-sunken);color:var(--danger)}
  .icon-btn svg{width:16px;height:16px;stroke-width:1.8}
  .add-line{display:flex;align-items:center;gap:9px;padding:12px;border:1.5px dashed var(--border-strong);border-radius:var(--radius-sm);color:var(--muted-dark);font-size:13px;font-weight:600;width:100%;justify-content:center;transition:.12s}
  .add-line:hover{border-color:var(--brand);color:var(--brand);background:var(--surface-alt)}
  .add-line svg{width:15px;height:15px;flex:0 0 15px;stroke-width:2}

  /* comms flow */
  .flow-line{display:flex;align-items:stretch;gap:0;flex-wrap:wrap}
  .flow-node{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;min-width:150px;position:relative}
  .flow-node .fn-type{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted-dark);font-weight:600}
  .flow-node .fn-title{font-size:13.5px;font-weight:600;margin-top:4px}
  .flow-node .fn-when{font-size:12px;color:var(--muted-dark);margin-top:6px}
  .flow-arrow{align-self:center;padding:0 6px;color:var(--border-strong)}
  .flow-arrow svg{width:18px;height:18px;stroke-width:1.8}

  /* toggle switch */
  .switch{position:relative;width:40px;height:23px;flex:0 0 40px}
  .switch input{opacity:0;width:0;height:0}
  .slider{position:absolute;inset:0;background:var(--border-strong);border-radius:20px;transition:.2s;cursor:pointer}
  .slider:before{content:"";position:absolute;height:17px;width:17px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
  .switch input:checked + .slider{background:var(--brand)}
  .switch input:checked + .slider:before{transform:translateX(17px);background:#fff}

  .toggle-row{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;padding:15px 0;border-bottom:1px solid var(--border)}
  .toggle-row:last-child{border-bottom:none}
  .toggle-row .tr-title{font-size:13.5px;font-weight:600}
  .toggle-row .tr-desc{font-size:12.5px;color:var(--muted-dark);margin-top:3px;max-width:440px}

  /* segments */
  .seg-card{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;background:var(--surface-alt);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:10px}
  .seg-card .seg-name{font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:9px}
  .seg-card .seg-count{font-size:12.5px;color:var(--muted-dark)}
  .seg-swatch{width:10px;height:10px;border-radius:3px}

  /* publish */
  .pub-choice{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:8px}
  .format-choice{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:8px}
  .pub-opt{border:1.5px solid var(--border-strong);border-radius:var(--radius);padding:22px;cursor:pointer;transition:.13s}
  .pub-opt:hover{border-color:var(--brand)}
  .pub-opt.sel{border-color:var(--brand);background:var(--brand-tint);color:var(--ink)}
  .pub-opt .po-icon{width:38px;height:38px;border-radius:10px;background:var(--surface-sunken);display:grid;place-items:center;margin-bottom:14px}
  .pub-opt .po-icon svg{width:20px;height:20px;stroke-width:1.6}
  .pub-opt.sel .po-icon{background:var(--brand);color:#fff}
  .pub-opt .po-title{font-size:15px;font-weight:700}
  .pub-opt .po-desc{font-size:12.5px;color:var(--muted-dark);margin-top:6px}
  .pub-opt.sel .po-desc{color:var(--muted-dark)}

  /* drag-and-drop block builder (page web / e-mail / formulaire) */
  .preview-page{border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--surface)}
  .builder-device{display:flex;gap:8px}
  .dev-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:20px;font-size:12.5px;font-weight:600;color:var(--muted-dark);background:var(--surface-sunken)}
  .dev-btn svg{width:14px;height:14px;stroke-width:2}
  .dev-btn.active{background:var(--surface-dark);color:#fff}
  .builder-layout{display:grid;grid-template-columns:260px 1fr;gap:20px;align-items:start}
  .builder-panel{background:var(--surface-alt);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
  .builder-row{display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid var(--border);cursor:grab}
  .builder-row:last-child{border-bottom:none}
  .builder-row:active{cursor:grabbing}
  .builder-handle{color:var(--muted-dark);font-size:15px;line-height:1}
  .builder-label{flex:1;font-size:12.5px;font-weight:600}
  .builder-preview{overflow:auto}
  .builder-frame.mobile .preview-page{width:375px;margin:0 auto;border-radius:26px;border:6px solid var(--surface-dark)}

  /* reporting */
  .chart-bars{display:flex;align-items:flex-end;gap:14px;height:180px;padding-top:20px}
  .chart-bars .cb{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end}
  .chart-bars .cb .cb-bar{width:100%;background:var(--brand);border-radius:6px 6px 0 0;position:relative;transition:.3s}
  .chart-bars .cb .cb-bar.dim{background:var(--surface-sunken)}
  .chart-bars .cb .cb-lbl{font-size:11px;color:var(--muted-dark);font-weight:500}
  .chart-bars .cb .cb-val{font-size:12px;font-weight:700;position:absolute;top:-20px;left:50%;transform:translateX(-50%)}

  .donut-wrap{display:flex;align-items:center;gap:24px}
  .legend-item{display:flex;align-items:center;gap:9px;font-size:13px;margin-bottom:10px}
  .legend-item .lg-dot{width:11px;height:11px;border-radius:3px}
  .legend-item .lg-val{margin-left:auto;font-weight:700}

  /* check-in phone */
  .phone-demo{display:flex;gap:20px;align-items:center}
  .phone{width:150px;flex:0 0 150px;background:var(--surface-dark);border-radius:20px;padding:8px;box-shadow:var(--shadow-16)}
  .phone .screen{background:#1F1F1F;border-radius:14px;overflow:hidden;height:290px;position:relative;display:flex;flex-direction:column}
  .phone .ph-top{padding:12px 12px 8px;color:var(--paper)}
  .phone .ph-scan{flex:1;margin:0 12px;border:2px solid var(--brand-on-dark);border-radius:11px;position:relative;background:#141414;overflow:hidden}
  .phone .ph-scan svg{width:32px;height:32px;stroke-width:1.2}
  .scanline{position:absolute;left:0;right:0;height:2px;background:var(--brand-on-dark);box-shadow:0 0 12px var(--brand-on-dark);animation:scan 2.4s ease-in-out infinite}
  @keyframes scan{0%,100%{top:12%}50%{top:88%}}
  .phone .ph-corner{position:absolute;width:16px;height:16px;border:3px solid var(--brand-on-dark)}
  .c-tl{top:9px;left:9px;border-right:none;border-bottom:none;border-radius:6px 0 0 0}
  .c-tr{top:9px;right:9px;border-left:none;border-bottom:none;border-radius:0 6px 0 0}
  .c-bl{bottom:9px;left:9px;border-right:none;border-top:none;border-radius:0 0 0 6px}
  .c-br{bottom:9px;right:9px;border-left:none;border-top:none;border-radius:0 0 6px 0}
  .phone .ph-foot{padding:12px 12px;color:var(--paper);text-align:center}
  .ph-count{font-size:22px;font-weight:700;color:var(--brand-on-dark)}

  .checkin-feed-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));column-gap:24px}
  .feed-item{display:flex;align-items:center;gap:13px;padding:13px 0;border-bottom:1px solid var(--border)}
  .feed-item .fi-time{font-size:11.5px;color:var(--muted-dark);margin-left:auto}
  .fi-check{width:12px;height:12px;flex:0 0 12px;stroke-width:2.5;vertical-align:-1px;color:var(--success-fg)}

  /* settings */
  .settings-nav{display:flex;gap:8px;border-bottom:1px solid var(--border);margin-bottom:24px}
  .settings-nav button{padding:11px 4px;font-size:13.5px;font-weight:600;color:var(--muted-dark);border-bottom:2px solid transparent;margin-bottom:-1px}
  .settings-nav button.active{color:var(--ink);border-color:var(--brand)}

  /* ===== Segment / audience builder (Dataverse-style) ===== */
  .sb-source{background:var(--info-bg);border:1px solid var(--brand-tint);color:var(--info-fg);border-radius:var(--radius-sm);padding:9px 13px;font-size:12.5px;font-weight:500;display:inline-flex;align-items:center;gap:8px}
  .sb-source svg{width:15px;height:15px;flex:0 0 15px}
  .member-pick{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:6px}
  .member-opt{border:1.5px solid var(--border-strong);border-radius:var(--radius-sm);padding:14px;cursor:pointer;transition:.12s;position:relative}
  .member-opt:hover{border-color:var(--brand)}
  .member-opt.sel{border-color:var(--brand);box-shadow:0 0 0 3px rgba(var(--brand-rgb),.2)}
  .member-opt .mo-radio{position:absolute;top:12px;right:12px;width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border-strong)}
  .member-opt.sel .mo-radio{border-color:var(--brand);background:radial-gradient(#fff 42%,transparent 46%);background-color:var(--brand)}
  .member-opt .mo-title{font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:8px}
  .member-opt .mo-title svg{width:16px;height:16px}
  .member-opt .mo-desc{font-size:11.5px;color:var(--muted-dark);margin-top:6px;line-height:1.4}
  .cond-block{border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;margin-top:14px}
  .cond-block .cb-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .cond-block .cb-title{font-size:12.5px;font-weight:700;display:flex;align-items:center;gap:8px}
  .cond-block .cb-title svg{width:15px;height:15px;color:var(--brand)}
  .cb-actions{display:flex;gap:14px;font-size:12px;color:var(--muted-dark);font-weight:600}
  .cb-actions button{display:inline-flex;align-items:center;gap:5px;color:var(--muted-dark)}
  .cb-actions button:hover{color:var(--ink)}
  .cb-actions svg{width:13px;height:13px}
  .cond-line{display:flex;align-items:center;gap:8px;padding-left:16px;position:relative}
  .cond-line:before{content:"";position:absolute;left:2px;top:-4px;bottom:50%;width:10px;border-left:1.5px solid var(--border-strong);border-bottom:1.5px solid var(--border-strong);border-radius:0 0 0 5px}
  .logic-sel{width:64px;flex:0 0 64px}
  .sel-sm,.inp-sm{padding:8px 10px;font-size:12.5px;border:1px solid var(--border-strong);border-radius:7px;background:var(--surface);font-family:inherit}
  .calc-box{background:var(--surface-dark);color:var(--paper);border-radius:var(--radius-sm);padding:16px;text-align:center}
  .calc-box .cx-num{font-size:26px;font-weight:700;color:var(--brand-on-dark);letter-spacing:-.5px}
  .calc-box .cx-lbl{font-size:11.5px;color:var(--muted);margin-top:2px}
  .sb-tabs{display:flex;gap:6px;border-bottom:1px solid var(--border);margin:18px 0 4px}
  .sb-tabs button{padding:9px 3px;font-size:13px;font-weight:600;color:var(--muted-dark);border-bottom:2px solid transparent;margin-bottom:-1px}
  .sb-tabs button.active{color:var(--ink);border-color:var(--brand)}

  .hidden{display:none!important}

  /* empty helper note */
  .proto-note{background:var(--warning-bg);border:1px solid #FFDDB3;border-radius:var(--radius-sm);padding:12px 15px;font-size:12.5px;color:var(--warning-fg);margin-bottom:22px;display:flex;gap:10px;align-items:flex-start}
  .proto-note svg{flex:0 0 16px;width:16px;height:16px;margin-top:1px}

  @media(max-width:920px){
    .kpi-grid{grid-template-columns:repeat(2,1fr)}
    .wizard{grid-template-columns:1fr}
    .phases{position:static}
    .row2,.row3{grid-template-columns:1fr}
  }
</style>
</head>

/* ---------- tiny icon set (feather-style, stroke=currentColor) ---------- */

/* ---------- brand wordmark (from brand kit: huddle-primary.svg, background removed) ----------
   variant 'light' (default) = light strokes for placement on dark ink surfaces (phone mockups).
   variant 'dark' = dark strokes for placement on the light Fluent surfaces (sidebar, e-mail previews). */
function logoMark(cls='', variant='light'){
  const stroke = variant==='dark' ? '#242424' : '#F4F3EE';
  const dot = variant==='dark' ? '#0F6CBD' : '#3DA9F5';
  return `<svg class="logo-mark${cls?' '+cls:''}" viewBox="0 0 220 78" xmlns="http://www.w3.org/2000/svg"><g transform="translate(13,5)"><g fill="none" stroke="${stroke}" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M10.5,11 V47.5"></path><path d="M10.5,35.75 A11.75,11.75 0 0 1 34,35.75 V47.5"></path><path d="M43.1,24 V35.25 A12.25,12.25 0 0 0 67.6,35.25 V24"></path><circle cx="88.5" cy="35.75" r="11.75"></circle><path d="M100.25,11 V35"></path><path d="M147.5,11 V41.5 A6,6 0 0 0 153.5,47.5"></path><path d="M160,35.75 H183.5"></path><path d="M183.5,35.75 A11.75,11.75 0 1 0 180,44"></path></g><path d="M133.7,11 A1.3,1.3 0 0 1 136.3,11 L136.3,36.6 Q136.3,40 133.9,40 L133.7,40 Z" fill="${stroke}"></path><g fill="${dot}"><circle cx="121" cy="24.95" r="3.3"></circle><circle cx="129.49" cy="29.85" r="3.3"></circle><circle cx="129.49" cy="39.65" r="3.3"></circle><circle cx="121" cy="44.55" r="3.3"></circle><circle cx="112.51" cy="39.65" r="3.3"></circle><circle cx="112.51" cy="29.85" r="3.3"></circle></g></g></svg>`;
}

/* ---------- sidebar (static left menu, per product constraint) ----------
   2-level list : Titre de catégorie (non cliquable) > Menus cliquables. */
const NAV = [
  { title:'Accueil', items:[
    { key:'dashboard', label:'Tableau de bord', icon:'grid' },
    { key:'reporting', label:'Reporting',       icon:'chart' },
  ]},
  { title:'Événements', items:[
    { key:'events',  label:'Tous les événements',      icon:'calendar' },
    { key:'create',  label:'Créer un événement',       icon:'plus' },
    { key:'guests',  label:'Invités & participants',   icon:'users' },
    { key:'checkin', label:'Check-in',                 icon:'scan' },
  ]},
  { title:'Administration', items:[
    { key:'settings', label:'Paramètres', icon:'settings' },
  ]},
];
const NAV_ITEMS = NAV.flatMap(g=>g.items);

function sidebar(){
  const groups = NAV.map(g=>`
    <div class="nav-label">${g.title}</div>
    ${g.items.map(n=>`
    <button class="nav-item ${state.route===n.key?'active':''}" onclick="go('${n.key}')">
      ${icon(n.icon)} <span>${n.label}</span>
    </button>`).join('')}`).join('');
  return `
  <aside class="sidebar">
    <div class="brand">${logoMark('', 'dark')}</div>
    <nav class="nav">
      ${groups}
    </nav>
    <div class="sidebar-foot">
      <div class="user">
        <div class="avatar">ML</div>
        <div><div class="u-name">Marie Lombard</div><div class="u-role">Event Manager</div></div>
      </div>
    </div>
  </aside>`;
}

/* ============================================================
   Programme & sessions — arbre de décision à 4 cas

     Est-ce un programme ?  NON → cas A (une seule session)
                             OUI → Type ?
                                     ODJ informatif        → cas B
                                     Multi-sessions → Groupe de sessions ?
                                                          SANS → cas C
                                                          AVEC → cas D

   Le cas se DÉRIVE de hasProgram/programType/useGroups (jamais stocké tel
   quel) pour ne jamais désynchroniser. Le quota est facultatif en A/B
   (state.quotaEnabled), obligatoire en C (par session) et D (par parcours).
   state.sessions et state.parcours restent la source de vérité unique :
   changer de cas ne supprime jamais les données déjà saisies, seule leur
   présentation change — voir sessionsEditor()/parcoursEditor().
   ============================================================ */

function programCase(){
  if (!state.hasProgram) return 'A';
  if (state.programType === 'odj') return 'B';
  return state.useGroups ? 'D' : 'C';
}
function isCaseAB(){ const c = programCase(); return c==='A' || c==='B'; }
function quotaActive(){
  const c = programCase();
  return (c==='C' || c==='D') ? true : !!state.quotaEnabled;
}

/* ---------- L'étape "Programme" du wizard est UNE seule étape côté sidebar,
   mais elle contient en interne un mini-parcours pas-à-pas (l'arbre de
   décision A/B/C/D), visualisé par une ligne de progression dans le panneau.
   progSubSteps() calcule dynamiquement la liste des écrans pertinents selon
   les réponses déjà données ; choisir une carte avance automatiquement au
   suivant (voir progSubGo()). ---------- */
function progSubSteps(){
  const steps = ['prog-has'];
  if (state.hasProgram) {
    steps.push('prog-type');
    if (state.programType === 'multi') steps.push('prog-groups');
  }
  steps.push('prog-content');
  return steps;
}
const PROG_SUB_LABELS = { 'prog-has':'Programme', 'prog-type':'Type', 'prog-groups':'Groupes', 'prog-content':'Détails' };

function progSubGo(i){
  const steps = progSubSteps();
  state.progSubStep = Math.max(0, Math.min(steps.length-1, i));
  render();
  const m=document.querySelector('.main'); if(m)m.scrollTo(0,0);
}

/* ---------- même principe pour l'étape "Quota" : une seule entrée dans le
   wizard, un mini-parcours interne de 1 ou 2 écrans selon le cas. ---------- */
function quotaSubSteps(){
  if (isCaseAB()) {
    const steps = ['quota-toggle'];
    if (state.quotaEnabled) steps.push('quota-content');
    return steps;
  }
  return ['quota-content']; // cas C/D : quota obligatoire, pas de question à poser
}
const QUOTA_SUB_LABELS = { 'quota-toggle':'Quota', 'quota-content':'Détails' };

function quotaSubGo(i){
  const steps = quotaSubSteps();
  state.quotaSubStep = Math.max(0, Math.min(steps.length-1, i));
  render();
  const m=document.querySelector('.main'); if(m)m.scrollTo(0,0);
}

/* ligne de progression générique, réutilisée par les étapes "Programme", "Quota" et "Intervenants" */
function subStepper(steps, idx, labels){
  return `<div class="prog-stepper">
    ${steps.map((k,i)=>`
      <div class="prog-stepper-item ${i===idx?'current':(i<idx?'done':'')}">
        <span class="prog-stepper-dot">${i<idx?icon('check'):i+1}</span>
        <span class="prog-stepper-label">${labels[k]}</span>
      </div>
      ${i<steps.length-1?'<span class="prog-stepper-line"></span>':''}`).join('')}
  </div>`;
}
function progProgressBar(){
  const steps = progSubSteps();
  return subStepper(steps, Math.min(state.progSubStep, steps.length-1), PROG_SUB_LABELS);
}

/* regroupe state.sessions par parcours, en conservant l'index réel dans state.sessions
   (nécessaire pour que les handlers d'édition ciblent la bonne entrée) */
function sessionsByParcours(){
  const withIndex = state.sessions.map((s,i)=>({ s, i }));
  const groups = state.parcours.map(p => ({
    ...p,
    entries: withIndex.filter(e => e.s.parcoursId === p.id),
  }));
  const orphans = withIndex.filter(e => !e.s.parcoursId);
  return { groups, orphans };
}

/* ---------- normalise le modèle en une structure commune, consommée telle
   quelle par Formulaires, Page web et Communications (hors périmètre de la
   restructuration : leur code n'est pas modifié, seul cet adaptateur l'est) ---------- */
function programModel(){
  const c = programCase();
  const hasQuota = quotaActive();
  const hasTime = true;
  const pickSessions = (c==='C' || c==='D');

  if (c === 'D') {
    const groups = state.parcours.map(p=>({
      name: p.name,
      quota: hasQuota ? (+p.quota||0) : null,
      sessions: state.sessions.filter(s=>s.parcoursId===p.id).map(s=>({ name:s.titre, room:s.salle, time:s.horaire })),
    }));
    const orphanItems = state.sessions.filter(s=>!s.parcoursId).map(s=>({ name:s.titre, room:s.salle, time:s.horaire }));
    return {
      hasQuota, hasTime, grouped:true, pickSessions,
      groups, items: groups.flatMap(g=>g.sessions).concat(orphanItems),
      totalQuota: hasQuota ? groups.reduce((a,g)=>a+(+g.quota||0),0) : null,
    };
  }

  const items = state.sessions.map(s=>({
    name:s.titre, room:s.salle, time:s.horaire,
    quota: (c==='C' && hasQuota) ? s.quota : null,
  }));
  return {
    hasQuota: hasQuota && c==='C', hasTime, grouped:false, items, pickSessions,
    totalQuota: (c==='A'||c==='B')
      ? (hasQuota ? state.eventCapacity : null)
      : (hasQuota ? items.reduce((a,s)=>a+(+s.quota||0),0) : null),
  };
}

/* ---------- Intervenants : options de rattachement selon le cas ---------- */
function attachOptions(){
  const c = programCase();
  if (c === 'A') return [{ value:'global:*', label:'Programme entier' }, ...state.sessions.map(s=>({ value:'session:'+s.id, label:s.titre }))];
  if (c === 'B') return [{ value:'global:*', label:'Programme entier' }, ...state.sessions.map(s=>({ value:'session:'+s.id, label:s.titre }))];
  if (c === 'C') return state.sessions.map(s=>({ value:'session:'+s.id, label:s.titre }));
  return [ // cas D : un groupe entier, ou une session précise
    ...state.parcours.map(p=>({ value:'group:'+p.id, label:'Parcours — '+p.name })),
    ...state.sessions.map(s=>({ value:'session:'+s.id, label:'Session — '+s.titre })),
  ];
}
function attachLabel(attachType, attachId){
  if (attachType === 'global') return 'Programme entier';
  if (attachType === 'group') return 'Parcours — ' + (state.parcours.find(p=>p.id===attachId)?.name || '?');
  return state.sessions.find(s=>s.id===attachId)?.titre || '?';
}
function addSpeakerFromDraft(){
  const { name, role, attach } = state.speakerDraft;
  if (!name || !attach) return;
  const [attachType, attachId] = attach.split(':');
  state.speakers.push({
    name, role,
    attachType, attachId: attachType==='global' ? null : attachId,
    session: attachLabel(attachType, attachId),
  });
  state.speakerFormOpen = false;
  render();
}

/* Steps grouped into 3 collapsible phase cards for the sidebar nav */
const PHASES = [
  { key:'setup',      label:'Je configure',                    icon:'settings', steps:['format','info','segment','program','quota','waitlist','speakers'] },
  { key:'experience', label:'Je construis l’expérience invité', icon:'grid',     steps:['forms','web','comms'] },
  { key:'launch',     label:'Je diffuse et je mesure',          icon:'rocket',   steps:['publish','survey'] },
];

/* En entrant dans l'étape "Programme" en avançant, on repart du début de son
   mini-parcours interne ; en y revenant en arrière, on retombe sur son dernier
   écran (le contenu déjà saisi), pas sur la première question. */
function wizGo(i){
  const steps = wizardSteps();
  const target = steps[Math.max(0, Math.min(steps.length-1, i))];
  const flow = target && SUB_FLOWS[target.key];
  if (flow && i !== state.wizardStep) {
    state[flow.stateKey] = (i > state.wizardStep) ? 0 : flow.subSteps().length-1;
  }
  state.wizardStep = Math.max(0, Math.min(steps.length-1, i));
  state.wizardMax = Math.max(state.wizardMax, state.wizardStep);
  state.wizardOpenPhase = null;
  render();
  const m=document.querySelector('.main'); if(m)m.scrollTo(0,0);
}

function togglePhase(key){
  state.wizardOpenPhase = key;
  render();
}

function phaseSidebar(){
  const steps = wizardSteps();
  const current = steps[state.wizardStep] || steps[0];
  const activeKey = (PHASES.find(p=>p.steps.includes(current.key)) || PHASES[0]).key;
  const openKey = state.wizardOpenPhase || activeKey;
  return `<div class="phases">${PHASES.map(p=>{
    const pSteps = steps.map((s,i)=>({...s,i})).filter(s=>p.steps.includes(s.key));
    if(!pSteps.length) return '';
    const done = pSteps.filter(s=>s.i<state.wizardMax).length;
    const isActive = p.key===activeKey;
    const isOpen = p.key===openKey;
    return `
    <div class="phase-card ${isActive?'active':''}">
      <button class="phase-head" onclick="togglePhase('${p.key}')">
        <span class="phase-icon">${icon(p.icon)}</span>
        <div class="phase-info">
          <div class="phase-title">${p.label}</div>
          <div class="phase-count">${done} sur ${pSteps.length} étapes</div>
          <div class="phase-bar"><i style="width:${Math.round(done/pSteps.length*100)}%"></i></div>
        </div>
      </button>
      ${isOpen?`<div class="phase-steps">${pSteps.map(s=>{
        const cls = s.i===state.wizardStep?'current':(s.i<state.wizardMax?'done':'');
        return `<button class="phase-step ${cls}" onclick="wizGo(${s.i})">
          <span class="ps-dot">${cls==='done'?icon('check'):''}</span>
          <span>${s.label}</span></button>`;
      }).join('')}</div>`:''}
    </div>`;
  }).join('')}</div>`;
}

function wizFoot(){
  const steps = wizardSteps();
  const first = state.wizardStep===0;
  const last = state.wizardStep===steps.length-1;

  // Tant qu'on est dans le mini-parcours interne d'une étape comme "Programme"
  // ou "Quota" (voir SUB_FLOWS), Précédent/Continuer naviguent d'abord dedans
  // et ne passent à l'étape wizard suivante/précédente qu'une fois à ses bornes.
  const flow = SUB_FLOWS[steps[state.wizardStep] && steps[state.wizardStep].key];
  const subLen = flow ? flow.subSteps().length : 0;
  const subIdx = flow ? state[flow.stateKey] : 0;
  const atSubStart = flow && subIdx === 0;
  const atSubEnd = flow && subIdx === subLen-1;
  const prevAction = (flow && !atSubStart) ? `${flow.goToName}(${subIdx-1})` : `wizGo(${state.wizardStep-1})`;
  const nextAction = (flow && !atSubEnd) ? `${flow.goToName}(${subIdx+1})` : `wizGo(${state.wizardStep+1})`;
  const isFirstScreen = first && (!flow || atSubStart);
  const isLastScreen = last && (!flow || atSubEnd);

  return `<div class="wp-foot">
    <button class="btn btn-ghost ${isFirstScreen?'hidden':''}" onclick="${prevAction}">${icon('arrowLeft')} Précédent</button>
    ${isFirstScreen?'<span></span>':''}
    ${isLastScreen
      ? `<button class="btn btn-acid" onclick="alert('Prototype : événement publié 🎉')">${icon('send')} Publier l’événement</button>`
      : `<button class="btn btn-primary" onclick="${nextAction}">Continuer ${icon('arrowRight')}</button>`}
  </div>`;
}

/* ---------- date helper (avoids re-typing the French long date format everywhere) ---------- */
function fmtDate(iso){
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});
}

/* ============================================================
   Drag-and-drop block builder — shared by the page/e-mail/form builders.
   Each builder is just: an array of {key,label,on} blocks in state,
   a preview renderer keyed by block.key, reordered by native HTML5 drag&drop.
   ============================================================ */
let builderDragIndex = null;
function builderDragStart(i){ builderDragIndex = i; }
function builderDrop(i, blocksKey){
  if(builderDragIndex===null || builderDragIndex===i) return;
  const arr = state[blocksKey];
  const [moved] = arr.splice(builderDragIndex,1);
  arr.splice(i,0,moved);
  builderDragIndex = null;
  render();
}

function builderShell(blocksKey, previewFn){
  const blocks = state[blocksKey];
  return `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px">
    <button class="btn btn-ghost" onclick="state.builderOpen=null;render()">${icon('arrowLeft')} Retour</button>
    <div class="builder-device">
      <button class="dev-btn ${state.builderDevice==='desktop'?'active':''}" onclick="state.builderDevice='desktop';render()">${icon('monitor')} Desktop</button>
      <button class="dev-btn ${state.builderDevice==='mobile'?'active':''}" onclick="state.builderDevice='mobile';render()">${icon('smartphone')} Mobile</button>
    </div>
  </div>
  <div class="builder-layout">
    <div class="builder-panel">
      <div class="sec-title" style="margin-bottom:2px">Sections</div>
      <div class="tr-desc" style="margin-bottom:10px">Glissez pour réordonner, activez pour afficher.</div>
      ${blocks.map((b,i)=>`
        <div class="builder-row" draggable="true" ondragstart="builderDragStart(${i})" ondragover="event.preventDefault()" ondrop="builderDrop(${i},'${blocksKey}')">
          <span class="builder-handle">⠿</span>
          <span class="builder-label">${b.label}</span>
          <label class="switch"><input type="checkbox" ${b.on?'checked':''} onchange="state.${blocksKey}[${i}].on=this.checked;render()"><span class="slider"></span></label>
        </div>`).join('')}
    </div>
    <div class="builder-preview">
      <div class="builder-frame ${state.builderDevice}">${previewFn(blocks.filter(b=>b.on))}</div>
    </div>
  </div>`;
}
