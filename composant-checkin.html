<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Composant Check-in — Huddle</title>
<style>
  :root{
    --ink:#0E0E0E;
    --acid:#CDFF3A;
    --paper:#F4F3EE;
    --muted:#8f9088;
    --font-body:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  svg{width:16px;height:16px;stroke-width:1.8}
  html,body{height:100%}
  body{
    font-family:var(--font-body);
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;
    padding:40px;
  }
  .phone-demo{display:flex;gap:32px;align-items:center;flex-wrap:wrap}
  .phone{width:250px;flex:0 0 250px;background:var(--ink);border-radius:30px;padding:12px;box-shadow:0 20px 50px -20px rgba(0,0,0,.5)}
  .phone .screen{background:#161616;border-radius:22px;overflow:hidden;height:500px;position:relative;display:flex;flex-direction:column}
  .phone .ph-top{padding:18px 18px 14px;color:var(--paper)}
  .phone .ph-scan{flex:1;margin:0 18px;border:2px solid var(--acid);border-radius:16px;position:relative;background:#0c0c0c;overflow:hidden}
  .phone .ph-scan svg{width:56px;height:56px;stroke-width:1.2}
  .scanline{position:absolute;left:0;right:0;height:2px;background:var(--acid);box-shadow:0 0 12px var(--acid);animation:scan 2.4s ease-in-out infinite}
  @keyframes scan{0%,100%{top:12%}50%{top:88%}}
  .phone .ph-corner{position:absolute;width:26px;height:26px;border:3px solid var(--acid)}
  .c-tl{top:14px;left:14px;border-right:none;border-bottom:none;border-radius:8px 0 0 0}
  .c-tr{top:14px;right:14px;border-left:none;border-bottom:none;border-radius:0 8px 0 0}
  .c-bl{bottom:14px;left:14px;border-right:none;border-top:none;border-radius:0 0 0 8px}
  .c-br{bottom:14px;right:14px;border-left:none;border-top:none;border-radius:0 0 8px 0}
  .phone .ph-foot{padding:20px 18px;color:var(--paper);text-align:center}
  .ph-count{font-size:30px;font-weight:700;color:var(--acid)}
  .logo-mark{display:block}
  .logo-mark.ph-logo{height:18px;width:auto}
</style>
</head>
<body>
  <div class="phone-demo" id="checkin-phone"></div>

  <script>
    function icon(name, cls=''){
      const I = {
        qr:'<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3h-3zM20 14h1M14 20h1M18 18h3v3"/>',
      };
      return `<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">${I[name]||''}</svg>`;
    }

    function logoMark(cls=''){
      return `<svg class="logo-mark${cls?' '+cls:''}" viewBox="0 0 220 78" xmlns="http://www.w3.org/2000/svg"><g transform="translate(13,5)"><g fill="none" stroke="#F4F3EE" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M10.5,11 V47.5"></path><path d="M10.5,35.75 A11.75,11.75 0 0 1 34,35.75 V47.5"></path><path d="M43.1,24 V35.25 A12.25,12.25 0 0 0 67.6,35.25 V24"></path><circle cx="88.5" cy="35.75" r="11.75"></circle><path d="M100.25,11 V35"></path><path d="M147.5,11 V41.5 A6,6 0 0 0 153.5,47.5"></path><path d="M160,35.75 H183.5"></path><path d="M183.5,35.75 A11.75,11.75 0 1 0 180,44"></path></g><path d="M133.7,11 A1.3,1.3 0 0 1 136.3,11 L136.3,36.6 Q136.3,40 133.9,40 L133.7,40 Z" fill="#F4F3EE"></path><g fill="#CDFF3A"><circle cx="121" cy="24.95" r="3.3"></circle><circle cx="129.49" cy="29.85" r="3.3"></circle><circle cx="129.49" cy="39.65" r="3.3"></circle><circle cx="121" cy="44.55" r="3.3"></circle><circle cx="112.51" cy="39.65" r="3.3"></circle><circle cx="112.51" cy="29.85" r="3.3"></circle></g></g></svg>`;
    }

    document.getElementById('checkin-phone').innerHTML = `
      <div class="phone">
        <div class="screen">
          <div class="ph-top">
            <div style="display:flex;align-items:center;gap:8px">${logoMark('ph-logo')}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:10px">Sommet Data &amp; IA 2026</div>
          </div>
          <div class="ph-scan">
            <div class="ph-corner c-tl"></div><div class="ph-corner c-tr"></div>
            <div class="ph-corner c-bl"></div><div class="ph-corner c-br"></div>
            <div class="scanline"></div>
            <div style="position:absolute;inset:0;display:grid;place-items:center;color:#333">${icon('qr','')}</div>
          </div>
          <div class="ph-foot">
            <div style="font-size:12px;color:var(--muted)">Participants présents</div>
            <div class="ph-count">248 <span style="font-size:14px;color:var(--muted);font-weight:500">/ 342</span></div>
          </div>
        </div>
      </div>`;
  </script>
</body>
</html>
